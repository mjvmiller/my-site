services:
  next:
    build: .
    ports:
      - 3000:3000
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - node_modules/
            - .env
            - Dockerfile
            - compose.yaml
            - .git
          initial_sync: true
        - action: rebuild
          path: package.json